<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout</title>

    <link rel="stylesheet" href="grid.css">
</head>

<body>


    <div class="page">


        <!-- HEADER -->
        <header class="header">
            HEADER
        </header>



        <!-- HERO -->
        <section class="hero">
            HERO BANNER
        </section>



        <!-- SIDEBAR -->
        <aside class="sidebar">

            <h2>Filter</h2>

            <label>
                <input type="checkbox">
                Laptop
            </label>

            <label>
                <input type="checkbox">
                Phone
            </label>

            <label>
                <input type="checkbox">
                Tablet
            </label>

            <label>
                <input type="checkbox">
                Accessories
            </label>

        </aside>



        <!-- MAIN -->
        <main class="main-content">

            <div class="product-card">Card 1</div>
            <div class="product-card">Card 2</div>
            <div class="product-card">Card 3</div>

            <div class="product-card">Card 4</div>
            <div class="product-card">Card 5</div>
            <div class="product-card">Card 6</div>

        </main>



        <!-- ADS -->
        <aside class="ads">

            <img
                src="https://picsum.photos/200/500"
                alt="ads">

        </aside>



        <!-- FOOTER -->
        <footer class="footer">
            FOOTER
        </footer>


    </div>


</body>

</html>
