<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Multimedia</title>
</head>
<body>

    <h1>Giới thiệu sản phẩm</h1>


    <!-- SVG -->
    <h2>Logo thương hiệu</h2>

    <svg width="120" height="120">

        <circle
            cx="60"
            cy="60"
            r="50"
            fill="blue">
        </circle>

        <text
            x="40"
            y="68"
            fill="white">
            SHOP
        </text>

    </svg>


    <!-- Ảnh -->
    <h2>Hình ảnh sản phẩm</h2>

    <figure>

        <img
            src="images/iphone1.jpg"
            alt="iPhone 16 Pro Max màu Titan"
            loading="lazy"
            style="max-width:100%; height:auto;">

        <figcaption>
            iPhone 16 Pro Max - Titan
        </figcaption>

    </figure>


    <figure>

        <img
            src="images/iphone2.jpg"
            alt="iPhone 16 màu đen mặt sau"
            loading="lazy"
            style="max-width:100%; height:auto;">

        <figcaption>
            iPhone 16 màu đen
        </figcaption>

    </figure>


    <figure>

        <img
            src="images/iphone3.jpg"
            alt="iPhone 16 phiên bản màu trắng"
            loading="lazy"
            style="max-width:100%; height:auto;">

        <figcaption>
            iPhone 16 màu trắng
        </figcaption>

    </figure>



    <!-- Youtube -->
    <h2>Video giới thiệu trên YouTube</h2>

    <iframe
        width="560"
        height="315"
        src="https://www.youtube.com/embed/TX9qSaGXFyg"
        title="YouTube video"
        allowfullscreen>
    </iframe>



    <!-- Video local -->
    <h2>Video sản phẩm</h2>

    <video
        controls
        poster="images/poster.jpg"
        width="600">

        <source
            src="videos/product.mp4"
            type="video/mp4">

        <source
            src="videos/product.webm"
            type="video/webm">

        Trình duyệt không hỗ trợ video.

    </video>



    <!-- Audio -->
    <h2>Nhạc nền giới thiệu</h2>

    <audio controls>

        <source
            src="audio/background.mp3"
            type="audio/mpeg">

        Trình duyệt không hỗ trợ audio.

    </audio>


</body>
</html>
