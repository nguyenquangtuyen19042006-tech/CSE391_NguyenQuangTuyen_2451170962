<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Validation Test - Câu A2</title>
</head>
<body>
    <h1>Kiểm tra HTML5 Validation</h1>
    
    <form>
        <p>
            <label>TH1 (Required):</label><br>
            <input type="text" required value="">
        </p>

        <p>
            <label>TH2 (Email):</label><br>
            <input type="email" value="abc">
        </p>

        <p>
            <label>TH3 (Number Range):</label><br>
            <input type="number" min="1" max="10" value="15">
        </p>

        <p>
            <label>TH4 (Pattern - 10 digits):</label><br>
            <input type="text" pattern="[0-9]{10}" value="abc123">
        </p>

        <p>
            <label>TH5 (Minlength):</label><br>
            <input type="password" minlength="8" value="123">
        </p>

        <button type="submit">Submit</button>
    </form>
</body>
</html>
